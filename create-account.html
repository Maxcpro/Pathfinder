<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ckccrigozrtrscirbvsn.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrY2NyaWdvenJ0cnNjaXJidnNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODAwOTMsImV4cCI6MjA5MDE1NjA5M30.lVUXcORfH3aoYB9d7VtnIwsby-Ru7nARpklj4ZEegkk";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form = document.getElementById("signup-form");
const submitButton = document.getElementById("signup-submit");
const message = document.getElementById("auth-message");

function showMessage(text, type) {
  message.textContent = text;
  message.className = `text-sm font-medium rounded-xl px-4 py-3 ${type === "error" ? "bg-red-50 text-red-700" : "bg-emerald-50 text-emerald-700"}`;
}

async function redirectIfAuthenticated() {
  const { data } = await supabaseClient.auth.getSession();
  if (data.session) {
    window.location.href = "./dashboard.html";
  }
}

form.addEventListener("submit", async (event) => {
  event.preventDefault();
  submitButton.disabled = true;
  showMessage("Creating your account...", "success");

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const fullName = document.getElementById("full_name").value.trim();

  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password,
    options: {
      data: {
        full_name: fullName
      },
      emailRedirectTo: `${window.location.origin}/dashboard.html`
    }
  });

  if (error) {
    showMessage(error.message, "error");
    submitButton.disabled = false;
    return;
  }

  if (data.session) {
    showMessage("Account created. Redirecting...", "success");
    window.location.href = "./dashboard.html";
    return;
  }

  showMessage("Account created. Check your email to confirm your sign-up, then log in.", "success");
  submitButton.disabled = false;
  form.reset();
});

redirectIfAuthenticated();
</script>
